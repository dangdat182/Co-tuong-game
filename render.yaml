services:
  - type: web
    name: co-tuong-game
    runtime: node
    buildCommand: npm_config_production=false npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    disk:
      name: data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
